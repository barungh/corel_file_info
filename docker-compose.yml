name: cdr-analyzer

services:
  # ── FastAPI Backend ───────────────────────────────────────
  # network_mode: host = backend shares the host network namespace.
  # This means localhost:11434 directly reaches Ollama on the host
  # with zero Docker bridge / iptables forwarding issues.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdr-backend
    network_mode: host
    environment:
      OLLAMA_BASE_URL: http://localhost:11434
    restart: unless-stopped

  # ── Angular Frontend (Nginx) ──────────────────────────────
  # Nginx proxies /api/ to port 8000 on the host gateway (172.18.0.1),
  # which is where the host-networked backend is listening.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdr-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cdr-net

networks:
  cdr-net:
    driver: bridge
