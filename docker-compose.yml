name: cdr-analyzer

services:
  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdr-backend
    ports:
      - "8000:8000"
    environment:
      # Override via: OLLAMA_BASE_URL=http://x.x.x.x:11434 docker compose up -d backend
      # Default: Docker bridge gateway IP (works on Oracle Cloud Linux)
      # If 172.17.0.1 doesn't work, run: ip route | grep docker0
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://172.17.0.1:11434}
    restart: unless-stopped
    networks:
      - cdr-net

  # ── Angular Frontend (Nginx) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdr-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cdr-net

networks:
  cdr-net:
    driver: bridge
