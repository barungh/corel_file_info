name: cdr-analyzer

services:
  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdr-backend
    ports:
      - "8000:8000"
    environment:
      # Override: OLLAMA_BASE_URL=http://x.x.x.x:11434 docker compose up -d backend
      # 172.18.0.1 = gateway of cdr-net bridge (the host, as seen by this container)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://172.18.0.1:11434}
    restart: unless-stopped
    networks:
      - cdr-net

  # ── Angular Frontend (Nginx) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdr-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cdr-net

networks:
  cdr-net:
    driver: bridge
