name: cdr-analyzer

services:
  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdr-backend
    ports:
      - "8000:8000"
    environment:
      # Reaches Ollama on the Docker host machine
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      # Required on Linux for host.docker.internal to resolve
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - cdr-net

  # ── Angular Frontend (Nginx) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdr-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cdr-net

networks:
  cdr-net:
    driver: bridge
