<div class="drop-zone" [class.is-dragging]="isDragging()">
  <div class="drop-zone__inner">
    <div class="drop-zone__icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 8L48 24H36V40H28V24H16L32 8Z" fill="currentColor" opacity="0.85"/>
        <path d="M12 44H52V52H12V44Z" rx="2" fill="currentColor" opacity="0.4"/>
        <rect x="12" y="44" width="40" height="8" rx="2" fill="currentColor" opacity="0.4"/>
      </svg>
    </div>
    <h2 class="drop-zone__title">Drop CorelDRAW Files Here</h2>
    <p class="drop-zone__subtitle">Drag &amp; drop <strong>.cdr</strong> files or click to browse. Multiple files supported.</p>
    <button class="drop-zone__btn" (click)="triggerInput()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Choose Files
    </button>
    <p class="drop-zone__note">Files are processed entirely in your browser. Nothing is uploaded without your confirmation.</p>
  </div>
  <input
    id="file-input"
    type="file"
    accept=".cdr"
    multiple
    style="display:none"
    (change)="onFileInput($event)"
  />
  <div class="drop-zone__overlay" *ngIf="isDragging()">
    <div class="drop-overlay__text">Release to analyze</div>
  </div>
</div>
